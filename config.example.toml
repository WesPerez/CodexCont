[server]
host = "127.0.0.1"
port = 8787
max_request_body_bytes = 33554432 # application-layer cap; 0 disables it
listen_paths = ["/v1/responses", "/responses"]

[upstream]
url = "https://chatgpt.com/backend-api/codex/responses"
mode = "header"                    # "fixed" = always use url; "header" = Responses-API-Base header (a BASE url, /responses appended) overrides url (else url); "header_required" = header MUST be present (else 400). Header is stripped before forwarding.
dynamic_allowed_origins = ["https://api.openai.com", "https://chatgpt.com"] # exact origins allowed in Responses-API-Base; empty disables dynamic targets
dynamic_allow_private_ips = false   # fixed URLs may be private; header-selected targets may not unless explicitly enabled
trust_env = false                   # ignore ambient HTTP(S)_PROXY unless a trusted egress proxy is required
# OPTIONAL explicit header overrides, applied last; EMPTY by default — the proxy
# passes the agent's headers through and invents none (no User-Agent of our own).
[upstream.headers]

[auth]
mode = "passthrough"               # passthrough | inject | passthrough_then_inject
access_token = ""                  # Bearer token; sent as `Authorization: Bearer <access_token>`
chatgpt_account_id = ""            # chatgpt-account-id; Codex needs it, empty = omit the header (plain Responses)

[continue]
enabled = true
model_prefixes = []                # empty = all models; e.g. ["gpt-"] folds only GPT models
truncation_step = 518
max_continue = 3                   # hard round cap after round 1 (primary runaway guard)
min_n = 1                          # only continue when truncation tier n >= min_n
max_n = 6                          # 0 = no cap; else stop forcing once n > max_n
retry_low_reasoning_after_continue = false # after a forced continue, retry clean rounds with very low reasoning
min_continue_reasoning_tokens = 0   # threshold for the low-reasoning retry; 0 catches zero-reasoning stalls
method = "commentary"              # continuation provocation method:
                                   #   "commentary" (default) = ONE phase:"commentary" assistant
                                   #     message (clean; an official Responses-API field). Verified
                                   #     to defeat truncation identically to the tool pair.
                                   #   "tool_pair" = synthetic continue_thinking function_call + output
marker_text = "Continue thinking..."   # commentary path: the assistant message text that nudges
                                       # the model to keep thinking
forward_marker = false             # commentary path: also emit the marker into the DOWNSTREAM output
                                   # so the agent echoes it back next turn (preserves cross-turn
                                   # reasoning structure + prompt-cache; codex & pi both verified to
                                   # preserve `phase`). false = hidden (clean agent history).
# --- tool_pair path only (used when method = "tool_pair") ---
continue_tool_name = "continue_thinking"   # synthetic tool name; ALSO the collision-bypass name: if
                                           # the agent itself DECLARES a tool with this name, the proxy
                                           # passes the request through untouched (tool_pair only)
continue_output_text = "Please continue thinking about the query."  # the function_call_output text
repair_followup = "off"            # tool_pair cross-turn: "off" (default) | "stateful" (id-keyed
                                   # re-insertion; codex strips reasoning ids, so mainly for agents
                                   # that preserve them — commentary's forward_marker is preferred)
max_total_output_tokens = 0        # optional cumulative cost cap across rounds (0 = off)

[stream]
force_include_encrypted = true     # add reasoning.encrypted_content upstream; always forwarded downstream
rechunk_final_answer = true        # re-slice the buffered final message into small synthetic deltas
rechunk_size = 16
upstream_event_timeout_seconds = 300 # max seconds to wait for the next parsed SSE data event
                                     # (SSE comments/keepalives do not count; 0 disables)
upstream_round_timeout_seconds = 480 # max wall-clock seconds for one upstream round, even if
                                     # parseable SSE events keep arriving; 0 disables
upstream_connect_timeout_seconds = 5 # TCP/TLS connect timeout
upstream_read_timeout_seconds = 330  # response-header and raw socket idle timeout
upstream_write_timeout_seconds = 60  # request-body upload timeout
upstream_pool_timeout_seconds = 5    # wait for an available pooled connection
upstream_dns_timeout_seconds = 5     # dynamic-target DNS validation timeout
upstream_error_body_timeout_seconds = 30 # total time allowed to read a non-2xx body
upstream_error_body_max_bytes = 4194304  # cap buffered non-2xx response bodies
upstream_max_connections = 256       # total HTTPX upstream connections
upstream_max_keepalive_connections = 64 # retained idle HTTPX connections

[log]
level = "info"
dump_rounds_dir = ""               # if set, dump per-round upstream SSE (codex_mw_r{n}.sse.txt)

[request_log]
enabled = false                    # write structured request-body audit records to SQLite
path = "logs/request_audit.sqlite3" # relative paths resolve from config.toml's directory
store_body = true                  # store original request body as compressed bytes
max_body_bytes = 0                 # 0 stores complete request bodies without audit truncation
background_body_writes = true      # enqueue body compression/SQLite writes off the request path
background_max_pending_bytes = 134217728 # bounded queue; backpressure instead of silent drops
retention_days = 7                 # automatically prune audit rows older than this many days; 0 = keep forever
sqlite_busy_timeout_ms = 5000      # DB lock wait; keep low in latency-sensitive production deployments
prune_interval_seconds = 0         # 0 = check every request; production can use 300 to throttle cleanup
prune_batch_size = 0               # 0 = delete all expired rows per pass; production can use a bounded batch
store_forwarded_body = true        # also store the actual body sent upstream after compatibility transforms
store_response_body = "errors"     # off | errors | all; streaming responses are stored as capped compressed prefixes
max_response_body_bytes = 1048576  # cap per stored upstream/downstream response body
preview_chars = 240                # short previews for fields like input[i].arguments; 0 = hash/length only

[compat]
normalize_input_arguments = false  # normalize selected input[i].arguments before forwarding:
                                   # function_call object -> JSON string; tool_search_call JSON string -> object
normalize_input_argument_item_types = ["function_call", "tool_search_call"]
synthesize_web_search_call_ids = false # synthesize stable ids for historical web_search_call items missing id
max_output_tokens_compat = "keep"  # keep | rename_to_max_tokens | drop (drop removes max_output_tokens and max_tokens)
reasoning_effort_compat = "keep"   # keep | minimal_to_none
